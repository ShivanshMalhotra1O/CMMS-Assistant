  identifiers:
    primary: serialNumber
    mongo: _id

  schema:
    serialNumber:
      type: string
      required: true
    name:
      type: string
    assetStatus:
      type: string
    category:
      type: string
    location:
      type: string
    typeOfAsset:
      type: string
    manufacturer:
      type: string
    createdAt:
      type: datetime

  indexes:
    - serialNumber
    - assetStatus
    - createdAt

  actions:
    view:
      description: View assets (single or list)
      query_type: auto

      capabilities:
        filter: true
        sort: true
        limit: true
        join: false
        aggregate: false

      filters:
        id: serialNumber
        status: assetStatus
        category: category
        location: location
        type: typeOfAsset
        manufacturer: manufacturer

      sorts:
