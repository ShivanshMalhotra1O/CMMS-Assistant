downtime:
  collection: downtimes

  identifiers:
    primary: _id
    mongo: _id

  schema:
    assetId:
      type: object_id
      required: true
    companyId:
      type: object_id
      required: true
    start:
      type: datetime
      required: true
    end:
      type: datetime
    state:
      type: string
    reason:
      type: array
    createdAt:
      type: datetime

  indexes:
    - assetId
    - companyId
    - start
    - state

  relations:
    asset:
      resource: asset
      local_field: assetId
      foreign_field: _id
      type: one
      exposable_fields:
        name: assetName
        location: assetLocation

  actions:
    view:
      description: View downtime records
      query_type: auto

      capabilities:
        filter: true
        sort: true
        limit: true
        join: true
        aggregate: false

      filters:
        asset: assetId
        company: companyId
        state: state

      sorts:
        recent:
          field: start
          order: desc
        oldest:
          field: start
          order: asc

      limits:
        default: 10
        max: 100

      fallback:
        sort: recent
        limit: default

      query_cache:
        enabled: true
        ttl_seconds: 300

      list_title: "📉 Downtime Records"

      response:
        title: "⛔ Asset Downtime"
        fields:
          assetName: "Asset"
          state: "State"
          start: "Start Time"
          end: "End Time"
