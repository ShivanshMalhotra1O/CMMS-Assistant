# =========================================================
# CMMS Resource Registry (FOOL-PROOF, DB + QUERY AWARE)
# =========================================================

work_order:
  collection: workorders

  identifiers:
    primary: workOrderId
    mongo: _id

  schema:
    workOrderId:
      type: string
      required: true
    name:
      type: string
      required: true
    description:
      type: string
    workStatus:
      type: string
    priority:
      type: string
    category:
      type: string
    dueDate:
      type: datetime
    asset:
      type: object_id
    createdAt:
      type: datetime
    updatedAt:
      type: datetime

  indexes:
    - workOrderId
    - createdAt
    - workStatus
    - priority

  relations:
    asset:
      resource: asset
      local_field: asset
      foreign_field: _id
      type: one
      exposable_fields:
        name: name
        location: location
        assetStatus: assetStatus

  actions:
    view:
      description: View work orders (single or list)
      query_type: auto

      capabilities:
        filter: true
        sort: true
        limit: true
        join: true
        aggregate: false

      filters:
        id: workOrderId
        status: workStatus
        priority: priority
        category: category
        asset: asset

      sorts:
        recent:
          field: createdAt
          order: desc
        oldest:
          field: createdAt
          order: asc
        priority_high:
          field: priority
          order: desc

      limits:
        default: 10
        max: 50

      fallback:
        sort: recent
        limit: default

      query_cache:
        enabled: true
        ttl_seconds: 300

      list_title: "📋 Work Orders"

      response:
        title: "🛠️ Work Order"
        fields:
          workOrderId: "Work Order ID"
          name: "Title"
          workStatus: "Status"
          priority: "Priority"
          asset.name: "Asset"
          asset.location: "Location"

