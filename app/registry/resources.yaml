# =========================================================
# CMMS Resource Registry (FOOL-PROOF)
# =========================================================

work_order:
  collection: workorders

  schema:
    workOrderId: string
    name: string
    description: string
    workStatus: string
    priority: string
    category: string
    dueDate: datetime
    asset: object_id
    createdAt: datetime
    updatedAt: datetime

  actions:
    view:
      description: View work orders (single or list)
      query_type: auto

      # -------------------------
      # WHERE
      # -------------------------
      filters:
        id: workOrderId
        status: workStatus
        priority: priority
        category: category
        asset: asset

      # -------------------------
      # ORDER BY (explicit only)
      # -------------------------
      sorts:
        recent:
          field: createdAt
          order: desc
        oldest:
          field: createdAt
          order: asc
        priority_high:
          field: priority
          order: desc

      # -------------------------
      # LIMIT (safety)
      # -------------------------
      limits:
        default: 10
        max: 50

      # -------------------------
      # FALLBACK (never fail)
      # -------------------------
      fallback:
        sort: recent
        limit: default

      list_title: "📋 Work Orders"

      response:
        title: "🛠️ Work Order"
        fields:
          workOrderId: "Work Order ID"
          name: "Title"
          workStatus: "Status"
          priority: "Priority"

# =========================================================

asset:
  collection: assets

  schema:
    _id: object_id
    serialNumber: string
    name: string
    assetStatus: string
    category: string
    location: string
    typeOfAsset: string
    manufacturer: string
    createdAt: datetime

  actions:
    view:
      description: View assets (single or list)
      query_type: auto

      # -------------------------
      # WHERE
      # -------------------------
      filters:
        id: serialNumber
        status: assetStatus
        category: category
        location: location
        type: typeOfAsset
        manufacturer: manufacturer

      # -------------------------
      # ORDER BY
      # -------------------------
      sorts:
        recent:
          field: createdAt
          order: desc
        name_asc:
          field: name
          order: asc

      # -------------------------
      # LIMIT
      # -------------------------
      limits:
        default: 10
        max: 50

      # -------------------------
      # FALLBACK
      # -------------------------
      fallback:
        sort: recent
        limit: default

      list_title: "📋 Assets"

      response:
        title: "🏗️ Asset"
        fields:
          serialNumber: "Asset Code"
          name: "Name"
          assetStatus: "Status"
          typeOfAsset: "Type"
          location: "Location"

# =========================================================

pm:
  collection: preventive_maintenance

  schema:
    pmId: string
    name: string
    frequency: string
    status: string
    nextRunDate: datetime
    createdAt: datetime

  actions:
    view:
      description: View PM schedules (single or list)
      query_type: auto

      # -------------------------
      # WHERE
      # -------------------------
      filters:
        id: pmId
        status: status
        frequency: frequency

      # -------------------------
      # ORDER BY
      # -------------------------
      sorts:
        upcoming:
          field: nextRunDate
          order: asc
        recent:
          field: createdAt
          order: desc

      # -------------------------
      # LIMIT
      # -------------------------
      limits:
        default: 10
        max: 50

      # -------------------------
      # FALLBACK
      # -------------------------
      fallback:
        sort: upcoming
        limit: default

      list_title: "📋 PM Schedules"

      response:
        title: "🗓️ PM Schedule"
        fields:
          pmId: "PM ID"
          name: "Name"
          frequency: "Frequency"
          status: "Status"
          nextRunDate: "Next Run Date"
