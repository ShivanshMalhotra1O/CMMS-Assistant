operations:
  create_workorder:
    description: "Create a new work order in the CMMS system"
    
    # What context do we need to fetch?
    context_needed:
      - asset_details
      - work_order_counter
      - available_technicians
      - past_workorders
    
    # What fields are required?
    required_fields:
      - workOrderId
      - name
      - asset
      - companyId
      - priority
      - category
      - workStatus
    
    # Field defaults
    defaults:
      workStatus: "Open"
      deleted: false
      authorizationType: "Digital Signature"